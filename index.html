<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Collège Social</title>
    <style>
        :root { --p: #4a90e2; --bg: #f0f2f5; --apple: #000000; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        #login-overlay { position: fixed; inset: 0; background: white; display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .login-card { background: white; padding: 25px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .auth-buttons { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; }
        .btn-round { width: 55px; height: 55px; border-radius: 50%; border: 1px solid #ddd; background: white; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s; padding: 0; }
        .btn-round.apple { background: var(--apple); border: none; }
        input { width: 100%; padding: 12px; margin: 6px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        nav { background: var(--p); color: white; width: 100%; padding: 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; position: sticky; top: 0; z-index: 1000; }
        .logout-btn { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 5px 10px; border-radius: 5px; font-size: 12px; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: white; border-top: 1px solid #ddd; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { width: 45px; height: 45px; border-radius: 10px; border: 1px solid #eee; overflow: hidden; display: flex; }
        .nav-item img { width: 100%; height: 100%; object-fit: contain; }
        #main-wrapper { display: none; padding: 15px; flex-direction: column; align-items: center; }
        .post { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; width: 100%; max-width: 500px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); box-sizing: border-box; }
        button.publier { background: var(--p); color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; margin-top: 10px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <div id="login-overlay">
        <div class="login-card">
            <h1>🎓 Collège Social</h1>
            <div class="auth-buttons">
                <button id="btnGoogle" class="btn-round"><img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="25"></button>
                <button id="btnApple" class="btn-round apple"><img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" width="25" style="filter: invert(1);"></button>
            </div>
            <input type="text" id="reg-prenom" placeholder="Prénom">
            <input type="text" id="reg-nom" placeholder="Nom">
            <button id="btnConnecter" style="background:var(--p); color:white; border:none; padding:12px; width:100%; border-radius:10px; margin-top:10px; cursor:pointer; font-weight:bold;">Entrer</button>
        </div>
    </div>

    <div id="main-wrapper">
        <nav><span>🎓 Collège Social</span><button class="logout-btn" id="btnLogout">Déconnexion</button></nav>
        <div style="width:100%; max-width:500px; padding: 15px; box-sizing: border-box;">
            <p id="welcome-msg" style="font-weight: bold;"></p>
            <textarea id="postText" placeholder="Quoi de neuf ?" style="width:100%; height:80px; border-radius:10px; border:1px solid #ddd; padding:10px; box-sizing:border-box; font-size: 16px;"></textarea>
            <button id="btnPublier" class="publier">Publier</button>
            <div id="feed" style="margin-top:20px;"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="https://pronote.net" target="_blank" class="nav-item"><img src="https://www.index-education.com/contenu/img/commun/logo-pronote-menu.png"></a>
        <a href="https://www.ecoledirecte.com/" target="_blank" class="nav-item"><img src="https://www.ecoledirecte.com/assets/images/logoEcoleDirecte.png"></a>
        <a href="https://www.skolengo.com/" target="_blank" class="nav-item"><img src="https://is1-ssl.mzstatic.com/image/thumb/Purple126/v4/06/a5/34/06a534ba-feb2-c49e-b3a6-c93f97c7b8bb/prodAppIcon-1x_U007emarketing-0-7-0-85-220.png/1200x630wa.png"></a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, OAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAXIryKruq3g7JtdM8jgv8IDGjserqY3IY",
            authDomain: "college-social-cloud.firebaseapp.com",
            projectId: "college-social-cloud",
            storageBucket: "college-social-cloud.firebasestorage.app",
            messagingSenderId: "757988289620",
            appId: "1:757988289620:web:6054829b97a73d28ce91c1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('btnGoogle').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
        document.getElementById('btnApple').onclick = () => signInWithPopup(auth, new OAuthProvider('apple.com'));
        document.getElementById('btnConnecter').onclick = () => {
            const p = document.getElementById('reg-prenom').value;
            if(p) { localStorage.setItem('tempUser', p); location.reload(); }
        };
        document.getElementById('btnLogout').onclick = () => {
            signOut(auth).then(() => { localStorage.removeItem('tempUser'); location.reload(); });
        };

        onAuthStateChanged(auth, (user) => {
            const temp = localStorage.getItem('tempUser');
            if (user || temp) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-wrapper').style.display = 'flex';
                document.getElementById('welcome-msg').innerText = "Salut " + (user ? user.displayName : temp) + " !";
                chargerMessages();
            }
        });

        document.getElementById('btnPublier').onclick = async () => {
            const txt = document.getElementById('postText').value;
            const name = auth.currentUser ? auth.currentUser.displayName : localStorage.getItem('tempUser');
            if(txt.trim() && name){
                const banCheck = await getDoc(doc(db, "BannedUsers", name));
                if(banCheck.exists()) { alert("❌ Tu as été banni."); return; }
                await addDoc(collection(db, "messages"), { texte: txt, auteur: name, date: serverTimestamp() });
                document.getElementById('postText').value = "";
            }
        };

        function chargerMessages() {
            const q = query(collection(db, "messages"), orderBy("date", "desc"));
            onSnapshot(q, (snaps) => {
                const f = document.getElementById('feed'); f.innerHTML = "";
                snaps.forEach(d => {
                    const data = d.data();
                    f.innerHTML += `<div class="post"><b>${data.auteur}</b><br>${data.texte}</div>`;
                });
            });
        }
    </script>
</body>
</html>
