<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Collège Social</title>
    <style>
        :root { --p: #4a90e2; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        #login-overlay { position: fixed; inset: 0; background: white; display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .login-card { background: white; padding: 25px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        nav { background: var(--p); color: white; padding: 15px; font-weight: bold; display: flex; justify-content: space-between; position: sticky; top: 0; z-index: 1000; }
        #main-wrapper { display: none; flex-direction: column; align-items: center; padding: 15px; }
        .post { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; width: 100%; max-width: 500px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .post b { color: var(--p); display: block; margin-bottom: 5px; }
        .post img { max-width: 100%; border-radius: 8px; margin-top: 10px; display: block; }
        .input-area { width: 100%; max-width: 500px; background: white; padding: 15px; border-radius: 12px; box-sizing: border-box; margin-bottom: 20px; }
        .action-btns { display: flex; gap: 10px; margin-top: 10px; }
        button.publier { background: var(--p); color: white; border: none; padding: 12px; border-radius: 10px; flex: 1; font-weight: bold; cursor: pointer; }
        .photo-btn { background: #eee; border: none; padding: 12px; border-radius: 10px; width: 50px; cursor: pointer; font-size: 1.2rem; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: white; border-top: 1px solid #ddd; display: flex; justify-content: space-around; align-items: center; }
        .nav-item { width: 45px; height: 45px; border: 1px solid #eee; border-radius: 8px; overflow: hidden; }
        .nav-item img { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h1>🎓 Collège Social</h1>
            <input type="text" id="reg-prenom" placeholder="Ton Prénom">
            <button id="btnConnecter" style="background:var(--p); color:white; border:none; padding:12px; width:100%; border-radius:10px; cursor:pointer; font-weight:bold;">Entrer</button>
        </div>
    </div>

    <div id="main-wrapper">
        <nav><span>🎓 Collège Social</span><button onclick="location.reload()" style="background:none; border:1px solid white; color:white; border-radius:5px; cursor:pointer;">Déconnexion</button></nav>
        
        <div class="input-area">
            <p id="welcome-msg" style="font-weight:bold;"></p>
            <textarea id="postText" placeholder="Quoi de neuf ?" style="width:100%; height:60px; border-radius:10px; border:1px solid #ddd; padding:10px; box-sizing:border-box;"></textarea>
            <div class="action-btns">
                <input type="file" id="fileInput" accept="image/*" style="display:none;">
                <button class="photo-btn" onclick="document.getElementById('fileInput').click()">📷</button>
                <button id="btnPublier" class="publier">Publier</button>
            </div>
            <div id="file-status" style="font-size:11px; color:gray; margin-top:5px;"></div>
        </div>
        <div id="feed" style="width:100%; max-width:500px;"></div>
    </div>

    <div class="bottom-nav">
        <a href="#" class="nav-item"><img src="https://www.index-education.com/contenu/img/commun/logo-pronote-menu.png"></a>
        <a href="#" class="nav-item"><img src="https://www.ecoledirecte.com/assets/images/logoEcoleDirecte.png"></a>
        <a href="#" class="nav-item"><img src="https://is1-ssl.mzstatic.com/image/thumb/Purple126/v4/06/a5/34/06a534ba-feb2-c49e-b3a6-c93f97c7b8bb/prodAppIcon-1x_U007emarketing-0-7-0-85-220.png/1200x630wa.png"></a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAXIryKruq3g7JtdM8jgv8IDGjserqY3IY",
            authDomain: "college-social-cloud.firebaseapp.com",
            projectId: "college-social-cloud",
            storageBucket: "college-social-cloud.firebasestorage.app",
            messagingSenderId: "757988289620",
            appId: "1:757988289620:web:6054829b97a73d28ce91c1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let user = localStorage.getItem('tempUser');
        if(user) { 
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-wrapper').style.display = 'flex';
            document.getElementById('welcome-msg').innerText = "Salut " + user + " !";
            chargerMessages();
        }

        document.getElementById('btnConnecter').onclick = () => {
            const p = document.getElementById('reg-prenom').value.trim();
            if(p) { localStorage.setItem('tempUser', p); location.reload(); }
        };

        let selectedFile = null;
        document.getElementById('fileInput').onchange = (e) => {
            selectedFile = e.target.files[0];
            document.getElementById('file-status').innerText = selectedFile ? "Photo prête !" : "";
        };

        document.getElementById('btnPublier').onclick = async () => {
            const p = localStorage.getItem('tempUser');
            // VERIFICATION DU BAN
            const banSnap = await getDoc(doc(db, "BannedUsers", p));
            if(banSnap.exists()) { alert("🚫 Tu es banni !"); return; }

            const txt = document.getElementById('postText').value;
            if(!txt && !selectedFile) return;
            document.getElementById('btnPublier').innerText = "Envoi...";

            let url = null;
            if(selectedFile) {
                const sRef = ref(storage, 'photos/' + Date.now());
                await uploadBytes(sRef, selectedFile);
                url = await getDownloadURL(sRef);
            }

            await addDoc(collection(db, "messages"), { auteur: p, texte: txt, image: url, date: serverTimestamp() });
            document.getElementById('postText').value = ""; selectedFile = null;
            document.getElementById('btnPublier').innerText = "Publier";
        };

        function chargerMessages() {
            onSnapshot(query(collection(db, "messages"), orderBy("date", "desc")), (snaps) => {
                const f = document.getElementById('feed'); f.innerHTML = "";
                snaps.forEach(d => {
                    const data = d.data();
                    let imgHtml = data.image ? `<img src="${data.image}">` : "";
                    f.innerHTML += `<div class="post"><b>${data.auteur}</b><span>${data.texte}</span>${imgHtml}</div>`;
                });
            });
        }
    </script>
</body>
</html>
