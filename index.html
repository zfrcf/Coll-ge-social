<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Collège Social Admin</title>
    <style>
        :root { --p: #4a90e2; --bg: #f0f2f5; --dark: #1c1e21; --red: #e74c3c; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; min-height: 100vh; }

        /* SIDEBAR */
        .sidebar { width: 75px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; align-items: center; padding-top: 20px; position: fixed; height: 100vh; z-index: 1000; gap: 20px; }
        .sidebar-item { width: 50px; height: 50px; border-radius: 12px; cursor: pointer; display: flex; justify-content: center; align-items: center; overflow: hidden; border: 1px solid #eee; background: white; }
        .sidebar-item img { width: 85%; height: 85%; object-fit: contain; }

        /* MAIN */
        #main-wrapper { flex: 1; margin-left: 75px; display: flex; flex-direction: column; align-items: center; width: calc(100% - 75px); }
        nav { background: var(--p); color: white; width: 100%; padding: 15px 25px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; position: sticky; top: 0; z-index: 900; }
        .container { width: 95%; max-width: 550px; margin-top: 20px; }

        /* POSTS */
        .post-box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 25px; }
        textarea { width: 100%; border: 1px solid #e4e6eb; border-radius: 10px; padding: 12px; resize: none; box-sizing: border-box; font-size: 15px; background: #f0f2f5; }
        button.primary { background: var(--p); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 12px; }

        .post { background: white; padding: 18px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 5px solid var(--p); position: relative; }
        .post-user { font-weight: bold; color: var(--dark); }
        .post-college { font-size: 0.75rem; color: var(--p); font-weight: 600; text-transform: uppercase; }
        
        /* BOUTON SUPPRIMER (ADMIN ONLY) */
        .delete-btn { 
            position: absolute; top: 10px; right: 10px; 
            background: var(--red); color: white; border: none; 
            padding: 5px 10px; border-radius: 5px; cursor: pointer; 
            font-size: 10px; font-weight: bold; display: none;
        }

        @media (max-width: 650px) {
            .sidebar { width: 100%; height: 65px; bottom: 0; top: auto; flex-direction: row; justify-content: space-evenly; padding-top: 0; border-right: none; border-top: 1px solid #ddd; }
            #main-wrapper { margin-left: 0; margin-bottom: 75px; width: 100%; }
        }

        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--p); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .login-card { background: white; padding: 30px; border-radius: 20px; width: 88%; max-width: 380px; text-align: center; }
        .login-card input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h2>🎓 Connexion</h2>
            <input type="text" id="reg-prenom" placeholder="Prénom">
            <input type="text" id="reg-nom" placeholder="Nom">
            <input type="text" id="reg-college" placeholder="Nom de ton Collège">
            <input type="password" id="reg-pass" placeholder="Mot de passe">
            <button id="btnConnecter" class="primary">Rejoindre</button>
        </div>
    </div>

    <div class="sidebar">
        <a href="https://0332569n.index-education.net/pronote/eleve" target="_blank" class="sidebar-item"><img src="https://www.index-education.com/contenu/img/commun/logo-pronote-menu.png"></a>
        <a href="https://www.ecoledirecte.com/" target="_blank" class="sidebar-item"><img src="https://www.ecoledirecte.com/assets/img/logo-ecoledirecte.png"></a>
        <a href="https://www.skolengo.com/" target="_blank" class="sidebar-item"><img src="https://www.skolengo.com/images/logo_skolengo.png"></a>
    </div>

    <div id="main-wrapper">
        <nav>
            <span>🎓 Collège Social Connect</span>
            <button onclick="localStorage.removeItem('collabUser'); location.reload();" style="background:none; border:1px solid white; color:white; cursor:pointer; padding:5px; border-radius:5px; font-size:10px;">Déconnexion</button>
        </nav>
        
        <div class="container">
            <div class="post-box">
                <p id="welcome-user" style="margin:0 0 12px 0; font-weight:bold;"></p>
                <textarea id="postInput" rows="3" placeholder="Quoi de neuf ?"></textarea>
                <button id="btnPublier" class="primary">Publier</button>
            </div>
            <div id="feed"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, deleteDoc } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAXIryKruq3g7JtdM8jgv8IDGjserqY3IY",
            authDomain: "college-social-cloud.firebaseapp.com",
            projectId: "college-social-cloud",
            storageBucket: "college-social-cloud.firebasestorage.app",
            messagingSenderId: "757988289620",
            appId: "1:757988289620:web:6054829b97a73d28ce91c1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const postsCol = collection(db, "messages");

        let user = JSON.parse(localStorage.getItem('collabUser'));
        
        // --- ICI LE CODE ADMIN ---
        const ADMIN_PASSWORD = "Admin123"; // CHANGE-LE ICI !
        const isAdmin = user && user.pass === ADMIN_PASSWORD;

        if(user) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('welcome-user').innerText = `Salut ${user.prenom}${isAdmin ? ' (Admin)' : ''} !`;
            chargerMessages();
        }

        document.getElementById('btnConnecter').onclick = () => {
            const p = document.getElementById('reg-prenom').value;
            const n = document.getElementById('reg-nom').value;
            const c = document.getElementById('reg-college').value;
            const pw = document.getElementById('reg-pass').value;
            if(p && n && c && pw) {
                localStorage.setItem('collabUser', JSON.stringify({prenom:p, nom:n, college:c, pass:pw}));
                location.reload();
            }
        };

        document.getElementById('btnPublier').onclick = async () => {
            const t = document.getElementById('postInput').value;
            if(t.trim() && user) {
                await addDoc(postsCol, { texte: t, auteur: user.prenom + " " + user.nom, college: user.college, date: serverTimestamp() });
                document.getElementById('postInput').value = "";
            }
        };

        function chargerMessages() {
            const q = query(postsCol, orderBy("date", "desc"));
            onSnapshot(q, (snapshot) => {
                const f = document.getElementById('feed');
                f.innerHTML = "";
                snapshot.forEach((d) => {
                    const data = d.data();
                    const postDiv = document.createElement('div');
                    postDiv.className = 'post';
                    postDiv.innerHTML = `
                        <div class="post-college">Collège ${data.college}</div>
                        <div class="post-user">${data.auteur}</div>
                        <div class="post-text">${data.texte}</div>
                        <button class="delete-btn" style="display:${isAdmin ? 'block' : 'none'}" onclick="supprimerPost('${d.id}')">SUPPRIMER</button>
                    `;
                    f.appendChild(postDiv);
                });
            });
        }

        window.supprimerPost = async (id) => {
            if(confirm("Supprimer ce message définitivement ?")) {
                await deleteDoc(doc(db, "messages", id));
            }
        };
    </script>
</body>
</html>
