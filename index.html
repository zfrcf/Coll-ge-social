<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Collège Social</title>
    <style>
        :root { --p: #4a90e2; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }

        /* --- LOGIN PAGE --- */
        #login-overlay { position: fixed; inset: 0; background: white; display: flex; justify-content: center; align-items: center; z-index: 2000; overflow-y: auto; padding: 20px 0; }
        .login-card { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 380px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        /* Bouton Google Rond */
        .google-circle-btn { width: 60px; height: 60px; border-radius: 50%; border: 1px solid #ddd; background: white; cursor: pointer; display: flex; justify-content: center; align-items: center; margin: 0 auto 20px; transition: 0.3s; }
        .google-circle-btn:hover { background: #f8f9fa; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        
        .separator { margin: 20px 0; display: flex; align-items: center; text-align: center; color: #888; font-size: 14px; }
        .separator::before, .separator::after { content: ''; flex: 1; border-bottom: 1px solid #ddd; }
        .separator:not(:empty)::before { margin-right: .5em; }
        .separator:not(:empty)::after { margin-left: .5em; }

        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button.primary { background: var(--p); color: white; border: none; padding: 14px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; }

        /* --- APP --- */
        #main-wrapper { flex: 1; display: none; flex-direction: column; align-items: center; width: 100%; }
        nav { background: var(--p); color: white; width: 100%; padding: 15px; font-weight: bold; text-align: center; }
        .container { width: 95%; max-width: 500px; margin-top: 20px; }
        .post { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h1 style="margin-top:0;">🎓 Collège Social</h1>
            <p style="color:#666; margin-bottom: 15px;">Connexion rapide :</p>
            
            <button id="btnGoogle" class="google-circle-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="30">
            </button>

            <div class="separator">OU</div>

            <p style="color:#666; font-size: 14px;">Connexion classique :</p>
            <input type="text" id="reg-prenom" placeholder="Prénom">
            <input type="text" id="reg-nom" placeholder="Nom">
            <input type="text" id="reg-college" placeholder="Ton Collège">
            <button id="btnConnecter" class="primary">Entrer</button>
        </div>
    </div>

    <div id="main-wrapper">
        <nav>🎓 Collège Social <span id="userStatus" style="font-size: 10px; float: right; cursor: pointer;" onclick="logout()">Déconnexion</span></nav>
        <div class="container">
            <textarea id="postText" placeholder="Quoi de neuf ?" style="width:100%; border-radius:10px; border:1px solid #ddd; padding:10px;"></textarea>
            <button id="btnPublier" class="primary" style="margin-top:10px;">Publier</button>
            <div id="feed" style="margin-top:20px;"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAXIryKruq3g7JtdM8jgv8IDGjserqY3IY",
            authDomain: "college-social-cloud.firebaseapp.com",
            projectId: "college-social-cloud",
            storageBucket: "college-social-cloud.firebasestorage.app",
            messagingSenderId: "757988289620",
            appId: "1:757988289620:web:6054829b97a73d28ce91c1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // 1. CONNEXION GOOGLE
        document.getElementById('btnGoogle').onclick = () => {
            signInWithPopup(auth, provider).catch(err => alert("Erreur domaine : " + err.code));
        };

        // 2. CONNEXION CLASSIQUE
        document.getElementById('btnConnecter').onclick = () => {
            const p = document.getElementById('reg-prenom').value;
            const n = document.getElementById('reg-nom').value;
            const c = document.getElementById('reg-college').value;
            if(p && n && c) {
                const userData = { displayName: p + " " + n, college: c, method: 'classic' };
                localStorage.setItem('tempUser', JSON.stringify(userData));
                afficherApp(userData.displayName);
            }
        };

        // SURVEILLER L'ÉTAT
        onAuthStateChanged(auth, (user) => {
            if (user) {
                afficherApp(user.displayName);
            } else if (localStorage.getItem('tempUser')) {
                const temp = JSON.parse(localStorage.getItem('tempUser'));
                afficherApp(temp.displayName);
            }
        });

        function afficherApp(name) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-wrapper').style.display = 'flex';
            chargerMessages();
        }

        window.logout = () => {
            signOut(auth);
            localStorage.removeItem('tempUser');
            location.reload();
        };

        document.getElementById('btnPublier').onclick = async () => {
            const txt = document.getElementById('postText').value;
            const name = auth.currentUser ? auth.currentUser.displayName : JSON.parse(localStorage.getItem('tempUser')).displayName;
            if(txt.trim()){
                await addDoc(collection(db, "messages"), { texte: txt, auteur: name, date: serverTimestamp() });
                document.getElementById('postText').value = "";
            }
        };

        function chargerMessages() {
            const q = query(collection(db, "messages"), orderBy("date", "desc"));
            onSnapshot(q, (snaps) => {
                const f = document.getElementById('feed'); f.innerHTML = "";
                snaps.forEach(d => {
                    const data = d.data();
                    f.innerHTML += `<div class="post"><b>${data.auteur}</b><br>${data.texte}</div>`;
                });
            });
        }
    </script>
</body>
</html>
