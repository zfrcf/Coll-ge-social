<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Collège Social</title>
    <style>
        :root { --p: #4a90e2; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        #login-overlay { position: fixed; inset: 0; background: white; display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .login-card { background: white; padding: 25px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        nav { background: var(--p); color: white; padding: 15px; font-weight: bold; display: flex; justify-content: space-between; position: sticky; top: 0; z-index: 1000; }
        #main-wrapper { display: none; flex-direction: column; align-items: center; padding: 15px; }
        .post { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; width: 100%; max-width: 500px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .post b { color: var(--p); display: block; margin-bottom: 5px; }
        .input-area { width: 100%; max-width: 500px; background: white; padding: 15px; border-radius: 12px; box-sizing: border-box; margin-bottom: 20px; }
        .action-btns { display: flex; gap: 10px; margin-top: 10px; align-items: center; }
        button.publier { background: var(--p); color: white; border: none; padding: 12px; border-radius: 10px; flex: 1; font-weight: bold; cursor: pointer; }
        .online-counter { font-size: 12px; color: #28a745; font-weight: bold; display: flex; align-items: center; gap: 4px; }
        .dot { width: 8px; height: 8px; background: #28a745; border-radius: 50%; display: inline-block; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h1>🎓 Collège Social</h1>
            <input type="text" id="reg-prenom" placeholder="Ton Prénom">
            <button id="btnConnecter" style="background:var(--p); color:white; border:none; padding:12px; width:100%; border-radius:10px; cursor:pointer; font-weight:bold;">Entrer</button>
        </div>
    </div>

    <div id="main-wrapper">
        <nav><span>🎓 Collège Social</span><button onclick="localStorage.clear(); location.reload();" style="background:none; border:1px solid white; color:white; border-radius:5px; cursor:pointer;">Quitter</button></nav>
        
        <div class="input-area">
            <p id="welcome-msg" style="font-weight:bold;"></p>
            <textarea id="postText" placeholder="Écris quelque chose..." style="width:100%; height:60px; border-radius:10px; border:1px solid #ddd; padding:10px; box-sizing:border-box; resize:none;"></textarea>
            <div class="action-btns">
                <button id="btnPublier" class="publier">Envoyer</button>
                <div class="online-counter">
                    <span class="dot"></span> <span id="userCount">...</span>
                </div>
            </div>
        </div>
        <div id="feed" style="width:100%; max-width:500px;"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAXIryKruq3g7JtdM8jgv8IDGjserqY3IY",
            authDomain: "college-social-cloud.firebaseapp.com",
            projectId: "college-social-cloud",
            storageBucket: "college-social-cloud.firebasestorage.app",
            messagingSenderId: "757988289620",
            appId: "1:757988289620:web:6054829b97a73d28ce91c1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let myName = localStorage.getItem('tempUser');

        if(myName) { 
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-wrapper').style.display = 'flex';
            document.getElementById('welcome-msg').innerText = "Salut " + myName + " !";
            chargerMessages();
            gererPresence();
        }

        document.getElementById('btnConnecter').onclick = () => {
            const p = document.getElementById('reg-prenom').value.trim();
            if(p) { localStorage.setItem('tempUser', p); location.reload(); }
        };

        async function gererPresence() {
            const p = localStorage.getItem('tempUser');
            const presenceRef = doc(db, "OnlineUsers", p);
            const heartbeat = () => setDoc(presenceRef, { lastSeen: serverTimestamp() });
            heartbeat();
            setInterval(heartbeat, 30000);
            onSnapshot(collection(db, "OnlineUsers"), (snap) => {
                document.getElementById('userCount').innerText = snap.size + " en ligne";
            });
            window.addEventListener('beforeunload', () => deleteDoc(presenceRef));
        }

        document.getElementById('btnPublier').onclick = async () => {
            const p = localStorage.getItem('tempUser');
            const banSnap = await getDoc(doc(db, "BannedUsers", p));
            if(banSnap.exists()) { alert("🚫 Tu es banni !"); return; }

            const txt = document.getElementById('postText').value.trim();
            if(!txt) return;

            await addDoc(collection(db, "messages"), { auteur: p, texte: txt, date: serverTimestamp() });
            document.getElementById('postText').value = "";
        };

        function chargerMessages() {
            onSnapshot(query(collection(db, "messages"), orderBy("date", "desc")), (snaps) => {
                const f = document.getElementById('feed'); f.innerHTML = "";
                snaps.forEach(d => {
                    const data = d.data();
                    f.innerHTML += `<div class="post"><b>${data.auteur}</b><span>${data.texte}</span></div>`;
                });
            });
        }
    </script>
</body>
</html>
