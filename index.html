<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Collège Social</title>
    <style>
        :root { --p: #4a90e2; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }

        /* --- LOGIN --- */
        #login-overlay { position: fixed; inset: 0; background: white; display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .login-card { background: white; padding: 25px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .google-btn-round { width: 55px; height: 55px; border-radius: 50%; border: 1px solid #ddd; background: white; cursor: pointer; display: flex; justify-content: center; align-items: center; margin: 0 auto 15px; }
        input { width: 100%; padding: 12px; margin: 6px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        
        /* --- NAV BASSE (MOBILE FIRST) --- */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: white; border-top: 1px solid #ddd; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { width: 45px; height: 45px; border-radius: 10px; border: 1px solid #eee; overflow: hidden; }
        .nav-item img { width: 100%; height: 100%; object-fit: contain; }

        /* --- APP --- */
        #main-wrapper { display: none; padding: 15px; flex-direction: column; align-items: center; }
        .post { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; width: 100%; max-width: 500px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        button.publier { background: var(--p); color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h1>🎓 Collège Social</h1>
            <button id="btnGoogle" class="google-btn-round">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="30">
            </button>
            <div style="margin: 15px 0; color: #888;">OU</div>
            <input type="text" id="reg-prenom" placeholder="Prénom">
            <input type="text" id="reg-nom" placeholder="Nom">
            <input type="text" id="reg-college" placeholder="Collège">
            <button id="btnConnecter" style="background:var(--p); color:white; border:none; padding:12px; width:100%; border-radius:10px; margin-top:10px;">Entrer</button>
        </div>
    </div>

    <div id="main-wrapper">
        <div style="width:100%; max-width:500px;">
            <textarea id="postText" placeholder="Quoi de neuf ?" style="width:100%; height:80px; border-radius:10px; border:1px solid #ddd; padding:10px; box-sizing:border-box;"></textarea>
            <button id="btnPublier" class="publier">Publier</button>
            <div id="feed" style="margin-top:20px;"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="https://0332569n.index-education.net/pronote" target="_blank" class="nav-item">
            <img src="https://www.index-education.com/contenu/img/commun/logo-pronote-menu.png" alt="Pronote">
        </a>
        <a href="https://www.ecoledirecte.com/" target="_blank" class="nav-item">
            <img src="https://www.ecoledirecte.com/assets/img/logo-ecoledirecte.png" alt="EcoleDirecte">
        </a>
        <a href="https://www.skolengo.com/" target="_blank" class="nav-item">
            <img src="https://www.skolengo.com/images/logo_skolengo.png" alt="Skolengo">
        </a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAXIryKruq3g7JtdM8jgv8IDGjserqY3IY",
            authDomain: "college-social-cloud.firebaseapp.com",
            projectId: "college-social-cloud",
            storageBucket: "college-social-cloud.firebasestorage.app",
            messagingSenderId: "757988289620",
            appId: "1:757988289620:web:6054829b97a73d28ce91c1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        document.getElementById('btnGoogle').onclick = () => signInWithPopup(auth, provider);

        document.getElementById('btnConnecter').onclick = () => {
            const p = document.getElementById('reg-prenom').value;
            if(p) {
                localStorage.setItem('tempUser', p);
                location.reload();
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user || localStorage.getItem('tempUser')) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-wrapper').style.display = 'flex';
                chargerMessages();
            }
        });

        document.getElementById('btnPublier').onclick = async () => {
            const txt = document.getElementById('postText').value;
            const name = auth.currentUser ? auth.currentUser.displayName : localStorage.getItem('tempUser');
            if(txt.trim()){
                await addDoc(collection(db, "messages"), { texte: txt, auteur: name, date: serverTimestamp() });
                document.getElementById('postText').value = "";
            }
        };

        function chargerMessages() {
            const q = query(collection(db, "messages"), orderBy("date", "desc"));
            onSnapshot(q, (snaps) => {
                const f = document.getElementById('feed'); f.innerHTML = "";
                snaps.forEach(d => {
                    const data = d.data();
                    f.innerHTML += `<div class="post"><b>${data.auteur}</b><br>${data.texte}</div>`;
                });
            });
        }
    </script>
</body>
</html>
